name: Publish Package

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for trusted publishing
        run: npm install -g npm@11.5.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish Beta (develop branch)
        if: github.ref == 'refs/heads/develop' && !contains(github.event.head_commit.message, '[skip ci]')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx release-it --preRelease=beta --ci

      - name: Publish Release (main branch)
        if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx release-it --ci

      - name: Sync release to develop (auto PR + merge)
        if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="chore/sync-release-to-develop"
          git fetch origin develop main
          git checkout -B "$BRANCH" origin/develop
          git merge origin/main -X theirs --no-edit \
            -m "chore: sync release to develop [skip ci]"
          git push --force-with-lease origin "$BRANCH"
          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr create \
              --base develop --head "$BRANCH" \
              --title "chore: sync release to develop [skip ci]" \
              --body "Automated sync of version bump and CHANGELOG from \`main\` after release. Merged automatically with \`[skip ci]\` to prevent re-publish on \`develop\`."
          fi
          gh pr merge "$BRANCH" \
            --merge --delete-branch \
            --subject "chore: sync release to develop [skip ci]" \
            --body "Auto-merged by publish.yml after main release."
